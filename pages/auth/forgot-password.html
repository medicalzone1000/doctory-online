<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — MediCore</title>

  <link rel="stylesheet" href="../../styles/base/variables.css">
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/typography.css">
  <link rel="stylesheet" href="../../styles/components/button.css">
  <link rel="stylesheet" href="../../styles/components/form.css">
  <link rel="stylesheet" href="../../styles/components/toast.css">
  <link rel="stylesheet" href="../../styles/components/spinner.css">
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">⚕ MediCore</div>

    <!-- Step 1: Enter email -->
    <div id="step-email">
      <h1 class="auth-card__title">Forgot password?</h1>
      <p class="auth-card__subtitle">Enter your email and we'll send you a reset link</p>

      <form class="form" id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label form-label--required" for="email">Email address</label>
          <div class="input-group">
            <span class="input-group__icon">✉</span>
            <input
              class="form-control"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--block btn--lg" id="submit-btn">
          <span class="btn__text">Send reset link</span>
        </button>
      </form>
    </div>

    <!-- Step 2: Success message -->
    <div id="step-success" style="display:none;text-align:center">
      <div style="font-size:3rem;margin-bottom:var(--space-4)">📬</div>
      <h1 class="auth-card__title">Check your email</h1>
      <p class="auth-card__subtitle" id="success-message">
        We sent a password reset link to your email address.
      </p>
      <p class="text-muted text-sm" style="margin-top:var(--space-4)">
        Didn't receive it? Check your spam folder or
        <button class="btn btn--ghost btn--sm" id="resend-btn" style="display:inline;padding:0;font-size:inherit">
          resend
        </button>
      </p>
    </div>

    <div class="auth-card__footer">
      <a href="/pages/auth/login.html">← Back to login</a>
    </div>
  </div>
</main>

<script type="module" src="../../src/pages/ForgotPassword.js"></script>
</body>
</html>
