<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles — MediCore Admin</title>

  <link rel="stylesheet" href="../../styles/base/variables.css">
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/typography.css">
  <link rel="stylesheet" href="../../styles/layout/container.css">
  <link rel="stylesheet" href="../../styles/components/button.css">
  <link rel="stylesheet" href="../../styles/components/card.css">
  <link rel="stylesheet" href="../../styles/components/navbar.css">
  <link rel="stylesheet" href="../../styles/components/toast.css">
  <link rel="stylesheet" href="../../styles/components/spinner.css">
  <link rel="stylesheet" href="../../styles/components/form.css">
  <link rel="stylesheet" href="../../styles/components/modal.css">
  <link rel="stylesheet" href="../../styles/pages/admin.css">
</head>
<body>

<header id="navbar" class="navbar"></header>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <nav class="admin-nav" aria-label="Admin navigation">
      <a href="index.html"    class="admin-nav__item" data-nav="dashboard">📊 Dashboard</a>
      <a href="articles.html" class="admin-nav__item" data-nav="articles">📝 Articles</a>
      <a href="users.html"    class="admin-nav__item" data-nav="users">👥 Users</a>
      <a href="../articles/index.html" class="admin-nav__item">↗ View Site</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-header__title">Articles</h1>
      <button class="btn btn--primary" id="new-article-btn">+ New Article</button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" style="margin-bottom:var(--space-6)">
      <div class="input-group filter-bar__search">
        <span class="input-group__icon">🔍</span>
        <input class="form-control" type="search" id="search-input" placeholder="Search articles…" autocomplete="off">
      </div>
      <select class="form-control" id="status-filter" style="max-width:160px">
        <option value="">All Status</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
        <option value="archived">Archived</option>
      </select>
      <select class="form-control" id="category-filter" style="max-width:180px">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="admin-table-wrap">
        <table class="admin-table" id="articles-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Author</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="articles-body">
            <tr><td colspan="6" class="admin-table__loading"><div class="spinner spinner--sm"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" style="margin-top:var(--space-6)"></div>
  </main>
</div>

<!-- Article Modal -->
<div id="article-modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:680px;width:100%" role="dialog" aria-modal="true" aria-labelledby="article-modal-title">
    <div class="modal__header">
      <h3 class="modal__title" id="article-modal-title">New Article</h3>
      <button class="modal__close btn btn--ghost btn--icon" id="modal-close-btn" aria-label="Close">&times;</button>
    </div>
    <div class="modal__body">
      <form id="article-form" novalidate>
        <input type="hidden" id="article-id">

        <div class="form-group">
          <label class="form-label form-label--required" for="article-title">Title</label>
          <input class="form-control" type="text" id="article-title" name="title" placeholder="Article title" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label form-label--required" for="article-category">Category</label>
            <select class="form-control" id="article-category" name="category" required>
              <option value="">Select category</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label form-label--required" for="article-status">Status</label>
            <select class="form-control" id="article-status" name="status" required>
              <option value="draft">Draft</option>
              <option value="published">Published</option>
              <option value="archived">Archived</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="article-excerpt">Excerpt</label>
          <textarea class="form-control" id="article-excerpt" name="excerpt" rows="2" placeholder="Short description…"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label form-label--required" for="article-content">Content</label>
          <textarea class="form-control" id="article-content" name="content" rows="8" placeholder="Article content (HTML supported)…" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="article-tags">Tags</label>
          <input class="form-control" type="text" id="article-tags" name="tags" placeholder="e.g. heart, surgery, tips (comma separated)">
          <span class="form-hint">Separate tags with commas</span>
        </div>
      </form>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn--primary" id="modal-save-btn">
        <span class="btn__text">Save Article</span>
      </button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal__header">
      <h3 class="modal__title">Delete Article</h3>
      <button class="modal__close btn btn--ghost btn--icon" id="delete-modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal__body">
      <p>Are you sure you want to delete <strong id="delete-article-title"></strong>? This cannot be undone.</p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" id="delete-cancel-btn">Cancel</button>
      <button class="btn btn--danger" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="../../src/pages/AdminArticles.js"></script>
</body>
</html>
