<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — MediCore Admin</title>

  <link rel="stylesheet" href="../../styles/base/variables.css">
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/typography.css">
  <link rel="stylesheet" href="../../styles/layout/container.css">
  <link rel="stylesheet" href="../../styles/components/button.css">
  <link rel="stylesheet" href="../../styles/components/card.css">
  <link rel="stylesheet" href="../../styles/components/navbar.css">
  <link rel="stylesheet" href="../../styles/components/toast.css">
  <link rel="stylesheet" href="../../styles/components/spinner.css">
  <link rel="stylesheet" href="../../styles/components/form.css">
  <link rel="stylesheet" href="../../styles/components/modal.css">
  <link rel="stylesheet" href="../../styles/pages/admin.css">
</head>
<body>

<header id="navbar" class="navbar"></header>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <nav class="admin-nav" aria-label="Admin navigation">
      <a href="/pages/admin/index.html"    class="admin-nav__item" data-nav="dashboard">📊 Dashboard</a>
      <a href="/pages/admin/articles.html" class="admin-nav__item" data-nav="articles">📝 Articles</a>
      <a href="/pages/admin/users.html"    class="admin-nav__item" data-nav="users">👥 Users</a>
      <a href="/pages/articles/index.html" class="admin-nav__item">↗ View Site</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-header__title">Users</h1>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" style="margin-bottom:var(--space-6)">
      <div class="input-group filter-bar__search">
        <span class="input-group__icon">🔍</span>
        <input class="form-control" type="search" id="search-input" placeholder="Search users…" autocomplete="off">
      </div>
      <select class="form-control" id="role-filter" style="max-width:160px">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="editor">Editor</option>
        <option value="user">User</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="admin-table-wrap">
        <table class="admin-table" id="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="6" class="admin-table__loading"><div class="spinner spinner--sm"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" style="margin-top:var(--space-6)"></div>
  </main>
</div>

<!-- Edit Role Modal -->
<div id="role-modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="role-modal-title">
    <div class="modal__header">
      <h3 class="modal__title" id="role-modal-title">Change Role</h3>
      <button class="modal__close btn btn--ghost btn--icon" id="role-modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal__body">
      <p style="margin-bottom:var(--space-4)">Changing role for: <strong id="role-user-name"></strong></p>
      <div class="form-group">
        <label class="form-label" for="role-select">New Role</label>
        <select class="form-control" id="role-select">
          <option value="user">User</option>
          <option value="editor">Editor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" id="role-cancel-btn">Cancel</button>
      <button class="btn btn--primary" id="role-save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal__header">
      <h3 class="modal__title">Delete User</h3>
      <button class="modal__close btn btn--ghost btn--icon" id="delete-modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal__body">
      <p>Are you sure you want to delete <strong id="delete-user-name"></strong>? This cannot be undone.</p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" id="delete-cancel-btn">Cancel</button>
      <button class="btn btn--danger" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="../../src/pages/AdminUsers.js"></script>
</body>
</html>
