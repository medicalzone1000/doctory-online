<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles — MediCore</title>

  <link rel="stylesheet" href="../../styles/base/variables.css">
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/typography.css">
  <link rel="stylesheet" href="../../styles/layout/container.css">
  <link rel="stylesheet" href="../../styles/components/button.css">
  <link rel="stylesheet" href="../../styles/components/card.css">
  <link rel="stylesheet" href="../../styles/components/navbar.css">
  <link rel="stylesheet" href="../../styles/components/toast.css">
  <link rel="stylesheet" href="../../styles/components/spinner.css">
  <link rel="stylesheet" href="../../styles/components/form.css">
  <link rel="stylesheet" href="../../styles/pages/articles.css">
</head>
<body>

<header id="navbar" class="navbar"></header>

<main>
  <section class="section section--sm" style="background:var(--color-surface-1);border-bottom:1px solid var(--color-border)">
    <div class="container">
      <h1 class="h2">Medical Articles</h1>
      <p class="text-muted" style="margin-top:var(--space-2)">Browse peer-reviewed content across all specialties</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="input-group filter-bar__search">
          <span class="input-group__icon">🔍</span>
          <input class="form-control" type="search" id="search-input" placeholder="Search articles…" autocomplete="off">
        </div>

        <select class="form-control filter-bar__select" id="category-filter">
          <option value="">All Specialties</option>
        </select>

        <select class="form-control filter-bar__select" id="sort-filter">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="popular">Most viewed</option>
        </select>
      </div>

      <!-- Results count -->
      <p class="results-count text-muted text-sm" id="results-count" style="margin-bottom:var(--space-6)"></p>

      <!-- Grid -->
      <div class="grid grid--3" id="articles-grid"></div>

      <!-- Pagination -->
      <div id="pagination" style="margin-top:var(--space-10)"></div>
    </div>
  </section>
</main>

<script type="module" src="../../src/pages/ArticleList.js"></script>
</body>
</html>
